<main class="auth-page">

  <section class="auth-card">

    <div class="auth-brand">

      <div class="brand-icon">
        I
      </div>

      <span>
        InternTrack
      </span>

    </div>

    <div class="auth-header">

      <h1>
        Welcome back
      </h1>

      <p>
        Sign in to continue your internship journey.
      </p>

    </div>

    <form (ngSubmit)="login()">

      <div class="form-group">

        <label for="email">
          Email address
        </label>

        <input id="email" type="email" name="email" [(ngModel)]="email" placeholder="you@example.com" required>

      </div>

      <div class="form-group">

        <div class="label-row">

          <label for="password">
            Password
          </label>

          <a href="javascript:void(0)">
            Forgot password?
          </a>

        </div>

        <input id="password" type="password" name="password" [(ngModel)]="password" placeholder="Enter your password"
          required>

      </div>

      @if (errorMessage) {

      <div class="error-message">

        {{ errorMessage }}

      </div>

      }
      <div>
        <button type="submit" class="auth-button" [disabled]="loading">

          {{ loading
          ? 'Signing in...'
          : 'Sign in'
          }}

        </button>

        @if(errorMessage){
        <p class="error-message">
          {{errorMessage}}
        </p>
        }
      </div>


    </form>

    <div class="divider">

      <span>
        or
      </span>

    </div>

    <p class="auth-footer">

      Don't have an account?

      <a routerLink="/register">

        Create one

      </a>

    </p>

  </section>

</main>
