<main class="auth-page">

  <section class="auth-card register-card">

    <div class="auth-brand">
      <div class="brand-icon">I</div>
      <span>InternTrack</span>
    </div>

    <div class="auth-header">

      <h1>
        Create your account
      </h1>

      <p>
        Start discovering opportunities that match
        your career goals.
      </p>

    </div>

    <form
      (ngSubmit)="register()">

      <div class="form-group">

        <label for="name">
          Full name
        </label>

        <input
          id="name"
          type="text"
          name="name"
          [(ngModel)]="name"
          placeholder="Enter your full name"
          required>

      </div>

      <div class="form-group">

        <label for="email">
          Email address
        </label>

        <input
          id="email"
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="you@example.com"
          required>

      </div>

      <div class="form-group">

        <label for="password">
          Password
        </label>

        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Create a password"
          required>

      </div>

      <div class="form-group">

        <label for="role">
          I am joining as
        </label>

        <select
          id="role"
          name="role"
          [(ngModel)]="role"
          required>

          <option
            value=""
            disabled>

            Select your role

          </option>

          <option value="STUDENT">

            Student

          </option>

          <option value="EMPLOYER">

            Employer

          </option>

        </select>

      </div>

      <button
        type="submit"
        class="auth-button">

        Create account

      </button>

    </form>

    @if (successMessage) {

      <div class="success-message">

        {{ successMessage }}

      </div>

    }

    @if (errorMessage) {

      <div class="error-message">

        {{ errorMessage }}

      </div>

    }

    <p class="auth-footer">

      Already have an account?

      <a routerLink="/login">

        Sign in

      </a>

    </p>

  </section>

</main>
